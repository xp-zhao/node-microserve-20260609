# 生产环境 Docker Compose 配置
# 使用命令: docker-compose up --build -d

services:
  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - GATEWAY_PORT=3000
      - GATEWAY_REQUEST_TIMEOUT=30000
      - USER_SERVICE_URL=http://user-service:3001
      - LOG_LEVEL=info
    depends_on:
      - user-service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - USER_SERVICE_PORT=3001
      - LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  default:
    name: microservice-network
